name: Publish Canary Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-canary-packages
  cancel-in-progress: false

jobs:
  publish-canary:
    if: github.repository == 'steerlabs/opensteer'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: npm-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm trusted-publishing support
        run: npm install --global npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace
        run: pnpm run check

      - name: Snapshot package versions
        run: pnpm changeset version --snapshot canary

      - name: Refresh workspace metadata
        run: pnpm install --no-frozen-lockfile

      - name: Publish canary package versions
        env:
          NPM_DIST_TAG: canary
        run: pnpm run release:publish
