name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            tests/test-app/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Build
        run: pnpm run build

  package-manager-compat:
    name: package-manager-compat (${{ matrix.manager }})
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - manager: npm
            install_root: npm install --no-audit --no-fund
            install_test_app: npm install --no-audit --no-fund
            run_cmd: npm run
          - manager: bun
            install_root: bun install
            install_test_app: bun install
            run_cmd: bun run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Bun
        if: matrix.manager == 'bun'
        uses: oven-sh/setup-bun@v2
      - name: Install (root)
        run: ${{ matrix.install_root }}
      - name: Install (test app)
        run: (cd tests/test-app && ${{ matrix.install_test_app }})
      - name: Typecheck
        run: ${{ matrix.run_cmd }} typecheck
      - name: Build
        run: ${{ matrix.run_cmd }} build
