<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opensteer Local</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <button
          id="drawer-toggle"
          class="drawer-toggle"
          type="button"
          aria-label="Toggle sessions panel"
          aria-controls="session-drawer"
          aria-expanded="false"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
          <span id="session-count-badge" class="session-count-badge" hidden>0</span>
        </button>

        <div class="brand-row">
          <svg class="brand-icon" viewBox="0 0 64 64" role="img" aria-label="Opensteer">
            <defs>
              <radialGradient id="opensteer-brand-fill" cx="34%" cy="22%" r="78%">
                <stop offset="0" stop-color="#ffffff" />
                <stop offset="0.58" stop-color="#eee9e4" />
                <stop offset="1" stop-color="#efc6ba" />
              </radialGradient>
            </defs>
            <circle cx="32" cy="32" r="25" fill="url(#opensteer-brand-fill)" />
          </svg>
          <span class="brand-name">Opensteer</span>
          <span class="brand-badge">Local</span>
        </div>

        <div class="top-bar-divider"></div>

        <button
          id="active-session-indicator"
          class="active-session-indicator"
          type="button"
          aria-label="Switch session"
          aria-controls="session-drawer"
          aria-expanded="false"
        >
          <span id="active-session-dot" class="active-session-dot"></span>
          <span id="active-session-label" class="active-session-label">No session selected</span>
          <svg
            class="active-session-chevron"
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </button>

        <div class="top-bar-spacer"></div>

        <button
          id="stop-view-button"
          class="local-view-toggle"
          type="button"
          data-testid="stop-view-button"
        >
          Turn View Off
        </button>
      </header>

      <div id="drawer-backdrop" class="drawer-backdrop"></div>
      <aside id="session-drawer" class="session-drawer">
        <div class="drawer-header">
          <span class="drawer-title">Sessions</span>
          <button
            id="drawer-close"
            class="drawer-close"
            type="button"
            aria-label="Close sessions panel"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="drawer-scroll">
          <div id="session-list" class="session-list" data-testid="session-list"></div>
        </div>
      </aside>

      <main class="main-shell">
        <div class="viewer-area">
          <div class="browser-frame">
            <div class="browser-chrome">
              <div class="chrome-top-row">
                <div class="window-dots">
                  <span class="wdot wdot-close"></span>
                  <span class="wdot wdot-min"></span>
                  <span class="wdot wdot-max"></span>
                </div>
                <div class="chrome-nav">
                  <button
                    id="back-button"
                    class="chrome-nav-btn"
                    type="button"
                    aria-label="Back"
                    data-testid="back-button"
                  >
                    <svg
                      width="14"
                      height="14"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <polyline points="15 18 9 12 15 6" />
                    </svg>
                  </button>
                  <button
                    id="forward-button"
                    class="chrome-nav-btn"
                    type="button"
                    aria-label="Forward"
                  >
                    <svg
                      width="14"
                      height="14"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <polyline points="9 18 15 12 9 6" />
                    </svg>
                  </button>
                  <button
                    id="reload-button"
                    class="chrome-nav-btn"
                    type="button"
                    aria-label="Reload"
                    data-testid="reload-button"
                  >
                    <svg
                      width="13"
                      height="13"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <polyline points="23 4 23 10 17 10" />
                      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                    </svg>
                  </button>
                  <button
                    id="new-tab-button"
                    class="chrome-nav-btn"
                    type="button"
                    aria-label="New tab"
                    data-testid="new-tab-button"
                  >
                    <svg
                      width="14"
                      height="14"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <line x1="12" y1="5" x2="12" y2="19" />
                      <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                  </button>
                </div>
                <div id="tab-strip" class="chrome-tabs" data-testid="tab-strip"></div>
                <div id="status-indicator" class="chrome-status">
                  <span id="status-dot" class="chrome-status-dot"></span>
                  <span id="status-label" class="chrome-status-label"></span>
                  <span id="status-text" class="sr-only" data-testid="status-text"></span>
                </div>
                <button
                  id="close-browser-button"
                  class="chrome-browser-action"
                  type="button"
                  aria-label="Close browser"
                  data-testid="close-browser-button"
                >
                  Close Browser
                </button>
              </div>
              <div class="chrome-url-row">
                <form id="address-form" class="chrome-url-bar">
                  <svg
                    class="chrome-url-icon"
                    width="12"
                    height="12"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <circle cx="12" cy="12" r="10" />
                    <line x1="2" y1="12" x2="22" y2="12" />
                    <path
                      d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                    />
                  </svg>
                  <input
                    id="address-input"
                    class="chrome-url-input"
                    type="text"
                    autocomplete="off"
                    spellcheck="false"
                    placeholder="Search or enter URL"
                    data-testid="address-input"
                  />
                </form>
              </div>
            </div>
            <div class="browser-viewport">
              <div
                id="viewer-surface"
                class="viewer-surface"
                tabindex="0"
                aria-label="Browser viewer"
                data-testid="viewer-surface"
              >
                <img
                  id="viewer-image"
                  class="viewer-image"
                  alt=""
                  draggable="false"
                  data-testid="viewer-image"
                />
                <div id="viewer-empty" class="viewer-empty">
                  <svg
                    class="viewer-empty-icon"
                    width="48"
                    height="48"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <circle cx="12" cy="12" r="10" />
                    <line x1="2" y1="12" x2="22" y2="12" />
                    <path
                      d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                    />
                  </svg>
                  <span id="viewer-empty-text" class="viewer-empty-label"
                    >No live browser selected</span
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      window.__OPENSTEER_LOCAL_BOOTSTRAP__ = __OPENSTEER_LOCAL_BOOTSTRAP_JSON__;
    </script>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
